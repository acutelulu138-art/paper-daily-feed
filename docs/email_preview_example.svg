<svg width="1120" height="704" viewBox="40 32 1120 704" style="max-width:100%;height:auto;" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Daily paper feeds email system preview</title>
  <desc id="desc">Email client UI showing a received Daily paper feeds recommendation email.</desc>
  <defs>
    <filter id="window-shadow" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#1d1d1f" flood-opacity="0.16"/>
    </filter>
    <filter id="card-shadow" x="-8%" y="-12%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; font-kerning: normal; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>

  <g class="ui" filter="url(#window-shadow)">
    <rect x="64" y="47" width="1072" height="666" rx="22" fill="#ffffff" stroke="#d2d2d7"/>
    <path d="M86 47h1028a22 22 0 0 1 22 22v39H64V69a22 22 0 0 1 22-22Z" fill="#f8f8fa" stroke="#d2d2d7"/>

    <circle cx="104" cy="78" r="7" fill="#ff5f56"/>
    <circle cx="128" cy="78" r="7" fill="#ffbd2e"/>
    <circle cx="152" cy="78" r="7" fill="#27c93f"/>
    <rect x="187" y="63" width="392" height="29" rx="15" fill="#eeeeef"/>
    <text x="211" y="82" fill="#86868b" font-size="13">Search</text>

    <line x1="373" y1="108" x2="373" y2="713" stroke="#e5e5ea"/>

    <text x="84" y="159" fill="#1d1d1f" font-size="25" font-weight="700">Inbox</text>
    <text x="84" y="184" fill="#6e6e73" font-size="14">12 unread emails</text>

    <rect x="84" y="216" width="269" height="103" rx="14" fill="#eef6ff" stroke="#d0e6ff"/>
    <circle cx="118" cy="250" r="19" fill="#007aff"/>
    <text x="118" y="257" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">D</text>
    <text x="144" y="246" fill="#1d1d1f" font-size="14" font-weight="700">Daily Paper Feeds</text>
    <text x="304" y="246" fill="#007aff" font-size="12" font-weight="600">09:00</text>
    <text x="144" y="269" fill="#1d1d1f" font-size="13" font-weight="600">Paper feed for 20 May</text>
    <text x="144" y="293" fill="#6e6e73" font-size="12">Daily paper recommendations</text>

    <text x="416" y="159" fill="#1d1d1f" font-size="26" font-weight="700">Paper feed for 20 May 2026</text>
    <text x="1095" y="153" text-anchor="end" fill="#6e6e73" font-size="13">Today, 09:00</text>
    <text x="416" y="187" fill="#6e6e73" font-size="14">From Daily Paper Feeds</text>
    <line x1="416" y1="203" x2="1095" y2="203" stroke="#e5e5ea"/>

    <g filter="url(#card-shadow)">
      <rect x="416" y="218" width="679" height="462" rx="18" fill="#e8f4ff"/>
      <text x="755" y="253" text-anchor="middle" fill="#007aff" font-size="12" font-weight="700" letter-spacing="1.7">Research Bulletin</text>
      <text x="755" y="290" text-anchor="middle" fill="#007aff" font-size="34" font-weight="700">Daily paper feeds</text>
      <text x="755" y="320" text-anchor="middle" fill="#6e6e73" font-size="14">A recommendation of papers based on your research interests.</text>

      <rect x="456" y="340" width="600" height="246" rx="18" fill="#ffffff" stroke="#d9ebff"/>
      <text x="480" y="372" fill="#007aff" font-size="12" font-weight="700" letter-spacing="1.1">Travel Behaviour and Society &#183; 2026-01-01</text>
      <text x="480" y="405" fill="#1d1d1f" font-size="22" font-weight="700">Predicting short-term urban bike sharing demand</text>
      <text x="480" y="433" fill="#1d1d1f" font-size="22" font-weight="700">in a coupled continuous and network space</text>
      <text x="480" y="464" fill="#424245" font-size="14">Shen Liang, Yang Xu, Guangyue Li, Xiaohu Zhang, Qiuping Li</text>
      <rect x="480" y="481" width="204" height="29" rx="15" fill="#007aff"/>
      <text x="582" y="500" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Recommendation score: 57.9%</text>
      <text x="480" y="542" fill="#1d1d1f" font-size="14" font-weight="700">TLDR:</text>
      <text x="526" y="542" fill="#424245" font-size="14">This study proposes GeoTopo-Net, a framework that jointly models</text>
      <text x="480" y="564" fill="#424245" font-size="14">dependencies in continuous and network spaces to improve demand prediction.</text>

      <text x="755" y="623" text-anchor="middle" fill="#6e6e73" font-size="13">Built with <tspan fill="#007aff" font-weight="700">paper-daily-feed</tspan> by <tspan fill="#007aff" font-weight="700">nehSgnaiL</tspan>.</text>
      <text x="755" y="646" text-anchor="middle" fill="#6e6e73" font-size="11" text-decoration="underline">Unsubscribe</text>
    </g>
  </g>
</svg>
