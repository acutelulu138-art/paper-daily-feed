name: Repository maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "37 21 * * 0"

permissions:
  contents: write

concurrency:
  group: repository-maintenance
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: nehSgnaiL/paper-daily-feed
  MAINTENANCE_BRANCH: paper-daily-feed-maintenance

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Keep scheduled workflows active
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin "${MAINTENANCE_BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${MAINTENANCE_BRANCH}"; then
            git switch -C "${MAINTENANCE_BRANCH}" "origin/${MAINTENANCE_BRANCH}"
          else
            git switch -c "${MAINTENANCE_BRANCH}"
          fi

          git commit --allow-empty -m "ci: keep scheduled workflows active"
          git push origin "${MAINTENANCE_BRANCH}"

  sync:
    if: ${{ github.repository != 'nehSgnaiL/paper-daily-feed' }}
    needs: keepalive
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Sync fork from upstream
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin main
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream main
          git switch -C main origin/main

          if git merge-base --is-ancestor upstream/main HEAD; then
            {
              echo "### Auto-sync checked"
              echo
              echo "The fork main branch already contains \`${UPSTREAM_REPOSITORY}:main\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if git merge-base --is-ancestor origin/main upstream/main; then
            git merge --ff-only upstream/main
          elif ! git merge --no-ff upstream/main -m "chore: sync upstream main"; then
            git merge --abort || true
            {
              echo "### Auto-sync skipped"
              echo
              echo "The fork main branch and \`${UPSTREAM_REPOSITORY}:main\` both changed, and Git could not merge them automatically."
              echo "No updates were pushed to \`main\`."
              echo
              echo "Resolve the conflicts manually, then rerun this workflow."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::warning title=Auto-sync skipped::Upstream changes could not be merged automatically."
            exit 0
          fi

          npm ci
          npm run build
          npm run test:email
          npm test

          git push origin main

          {
            echo "### Auto-sync completed"
            echo
            echo "The fork main branch was updated from \`${UPSTREAM_REPOSITORY}:main\` after verification passed."
          } >> "$GITHUB_STEP_SUMMARY"
