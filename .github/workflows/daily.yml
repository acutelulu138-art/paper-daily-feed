name: Daily paper feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "11 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-paper-feeds
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check fork sync status
        if: ${{ github.repository != 'nehSgnaiL/paper-daily-feed' }}
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/nehSgnaiL/paper-daily-feed.git
          git fetch --no-tags upstream main

          if ! git merge-base --is-ancestor upstream/main HEAD; then
            {
              echo "### Sync fork reminder"
              echo
              echo "Your fork is behind \`nehSgnaiL/paper-daily-feed:main\`."
              echo "Weekly auto-sync may handle this; check the **Repository maintenance** workflow if this warning keeps appearing."
              echo
              echo "You can still sync manually from your fork on GitHub if you need the update immediately."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::warning title=Sync fork recommended::Your fork is behind upstream. Sync it to receive the latest features and bug fixes."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Transformers.js cache
        uses: actions/cache@v5
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: ${{ runner.os }}-transformers-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-transformers-

      - name: Typecheck
        run: npm run build

      - name: Load delivery history
        run: |
          set -euo pipefail

          git fetch --no-tags origin paper-daily-feed-state || true
          if git show-ref --verify --quiet refs/remotes/origin/paper-daily-feed-state; then
            if git show origin/paper-daily-feed-state:.delivery-history.json > /tmp/paper-daily-feed-delivery-history.json; then
              cp /tmp/paper-daily-feed-delivery-history.json .delivery-history.json
            fi
          fi

      - name: Run recommendation feed
        env:
          APP_CONFIG: ${{ vars.APP_CONFIG }}
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_BASE_URL: ${{ vars.EMBEDDING_BASE_URL || secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          DELIVERY_HISTORY_SALT: ${{ secrets.DELIVERY_HISTORY_SALT }}
          SENDER: ${{ secrets.SENDER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: npm start -- run

      - name: Save delivery history
        run: |
          set -euo pipefail

          if [ ! -f .delivery-history.json ]; then
            echo "No delivery history file was produced."
            exit 0
          fi

          cp .delivery-history.json /tmp/paper-daily-feed-delivery-history.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/remotes/origin/paper-daily-feed-state; then
            git switch -C paper-daily-feed-state origin/paper-daily-feed-state
          else
            git switch --orphan paper-daily-feed-state
            git rm -rf . || true
          fi

          cp /tmp/paper-daily-feed-delivery-history.json .delivery-history.json
          git add -f .delivery-history.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update delivery history"
          git push origin paper-daily-feed-state
